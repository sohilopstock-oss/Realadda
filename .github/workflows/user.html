<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My OTT Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .hidden { display: none !important; }
        .glass { background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="main-app" class="max-w-md mx-auto p-4 min-h-screen flex flex-col">
        <h1 class="text-3xl font-bold text-red-600 text-center my-8 italic">MY OTT</h1>

        <div id="error-display" class="hidden bg-red-900/30 border border-red-600 p-4 rounded text-red-500 text-xs mb-4 text-center"></div>

        <!-- 1. LOADING SCREEN -->
        <div id="view-loading" class="flex-1 flex flex-col items-center justify-center">
            <div class="w-10 h-10 border-4 border-red-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-gray-500 animate-pulse">Connecting...</p>
        </div>

        <!-- 2. LOGIN SCREEN -->
        <div id="view-login" class="hidden flex-1 flex flex-col justify-center">
            <div class="glass text-center">
                <p class="mb-4 text-gray-400">Premium videos dekhne ke liye login karein</p>
                <input type="email" id="email" placeholder="Apna Gmail ID" class="w-full p-3 rounded bg-black border border-gray-800 mb-4 outline-none focus:border-red-600 text-white">
                <button onclick="login()" id="btn-login" class="w-full bg-red-600 p-3 rounded-xl font-bold active:scale-95 transition">Get Magic Link</button>
                <p id="login-status" class="mt-4 text-xs text-yellow-500"></p>
            </div>
        </div>

        <!-- 3. MAIN DASHBOARD -->
        <div id="view-main" class="hidden flex-1">
            <div id="status-card" class="glass text-center mb-6 italic text-sm">Checking Status...</div>
            
            <div id="video-box" class="hidden">
                <h3 class="mb-4 font-bold text-red-500 border-l-4 border-red-600 pl-2 text-lg uppercase">Premium Shorts 🔥</h3>
                <!-- APNA VIDEO LINK YAHAN DALO -->
                <video src="YOUR_VIDEO_URL_HERE" controls class="w-full rounded-2xl shadow-2xl border border-gray-900 bg-black"></video>
            </div>

            <button onclick="logout()" class="mt-auto py-10 text-gray-700 text-[10px] uppercase w-full text-center tracking-widest">Logout Account</button>
        </div>

        <!-- 4. PAYMENT SCREEN -->
        <div id="view-pay" class="hidden flex-1">
            <div class="glass text-center">
                <h2 class="text-xl font-bold mb-4 text-yellow-500 italic">Unlock Premium (₹99)</h2>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=YOUR_UPI@okicici&am=99" class="mx-auto mb-4 border-2 border-white rounded-lg">
                <p class="text-[10px] text-gray-500 mb-6 italic">Scan karein aur payment ke baad 12-digit UTR yahan bharein.</p>
                <input type="text" id="utr" placeholder="UTR Number" class="w-full p-3 bg-black border border-gray-800 rounded-lg mb-4 text-center text-white">
                <button onclick="submitPayment()" class="w-full bg-green-600 p-3 rounded-xl font-bold">Submit Details</button>
                <button onclick="showView('view-main')" class="mt-4 text-xs text-gray-500 underline">Back</button>
            </div>
        </div>

        <!-- 5. ADMIN SCREEN -->
        <div id="view-admin" class="hidden flex-1">
            <h2 class="text-xl font-bold mb-6 text-blue-500 border-b border-blue-900 pb-2">Admin Panel</h2>
            <div id="admin-list" class="space-y-3"></div>
            <button onclick="window.location.href='index.html'" class="mt-10 text-xs text-gray-600 w-full text-center">Go to Home</button>
        </div>

    </div>

    <script>
        // AAPKI DETAILS MAINE SAHI SE FILL KAR DI HAIN
        const SUPA_URL = 'https://txsdqbqqntjdobcidczy.supabase.co'.trim();
        const SUPA_KEY = 'sb_publishable_FBrKnOFTuHjSqEkjmEGVRA_3g4P4DjX'.trim();
        let sb;

        function showView(id) {
            document.querySelectorAll('#main-app > div').forEach(el => {
                if(el.id !== 'error-display') el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        async function start() {
            try {
                if (typeof supabase === 'undefined') {
                    document.getElementById('error-display').classList.remove('hidden');
                    document.getElementById('error-display').innerText = "Lib Not Loaded. Check Internet.";
                    return;
                }

                sb = supabase.createClient(SUPA_URL, SUPA_KEY);

                const params = new URLSearchParams(window.location.search);
                if (params.get('admin') === 'true') { 
                    loadAdmin(); 
                    return; 
                }

                const { data: { user } } = await sb.auth.getUser();
                
                if (user) {
                    showView('view-main');
                    loadUserStatus(user);
                } else {
                    showView('view-login');
                }
            } catch (e) {
                document.getElementById('error-display').classList.remove('hidden');
                document.getElementById('error-display').innerText = e.message;
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            if(!email) return alert("Email daalein");
            document.getElementById('btn-login').innerText = "Sending Link...";
            const { error } = await sb.auth.signInWithOtp({ 
                email, 
                options: { emailRedirectTo: window.location.href } 
            });
            if(error) { alert(error.message); document.getElementById('btn-login').innerText = "Get Magic Link"; }
            else document.getElementById('login-status').innerText = "✅ Link sent! Check your Gmail.";
        }

        async function loadUserStatus(user) {
            const card = document.getElementById('status-card');
            const { data } = await sb.from('premium_users').select('*').eq('id', user.id).maybeSingle();

            const now = new Date();

            if (!data || data.status === 'free') {
                card.innerHTML = `Welcome, ${user.email}<br><button onclick="showView('view-pay')" class="mt-3 bg-red-600 px-4 py-2 rounded-full text-xs font-bold italic uppercase">Get Premium Access</button>`;
            } else if (data.status === 'pending') {
                card.innerHTML = `<span class="text-blue-400 font-bold">Checking Payment...</span><br><span class="text-[10px]">UTR: ${data.utr}</span>`;
            } else if (data.status === 'approved' && new Date(data.expiry_date) > now) {
                card.innerHTML = `<span class="text-green-500 font-bold italic text-lg">Premium Active ✅</span>`;
                document.getElementById('video-box').classList.remove('hidden');
            } else {
                card.innerHTML = `<span class="text-red-500 font-bold italic">Plan Expired!</span><br><button onclick="showView('view-pay')" class="mt-3 bg-red-600 px-4 py-2 rounded-full text-xs font-bold uppercase">Recharge Now</button>`;
            }
        }

        async function submitPayment() {
            const utr = document.getElementById('utr').value;
            if(utr.length < 10) return alert("UTR sahi bharein!");
            
            const { data: { user } } = await sb.auth.getUser();
            const { error } = await sb.from('premium_users').upsert({
                id: user.id, email: user.email, utr: utr, status: 'pending'
            });

            if(!error) { alert("Details Submitted!"); window.location.reload(); }
            else alert(error.message);
        }

        async function loadAdmin() {
            showView('view-admin');
            const { data } = await sb.from('premium_users').select('*').eq('status', 'pending');
            const list = document.getElementById('admin-list');
            list.innerHTML = data && data.length ? "" : "<p class='text-gray-600 py-10'>No pending requests found.</p>";
            data && data.forEach(u => {
                list.innerHTML += `<div class="bg-gray-900 p-4 rounded-xl flex justify-between items-center border border-gray-800">
                    <div class="text-[10px]"><b>${u.email}</b><br><span class="text-yellow-500 italic">UTR: ${u.utr}</span></div>
                    <button onclick="approve('${u.id}')" class="bg-green-600 px-3 py-1 rounded font-bold text-xs">Approve</button>
                </div>`;
            });
        }

        async function approve(uid) {
            const exp = new Date(); exp.setDate(exp.getDate() + 30);
            const { error } = await sb.from('premium_users').update({ status: 'approved', expiry_date: exp.toISOString() }).eq('id', uid);
            if(!error) { alert("User Approved!"); loadAdmin(); }
        }

        async function logout() { await sb.auth.signOut(); window.location.reload(); }

        window.onload = start;
    </script>
</body>
</html>
